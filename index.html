<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<div class="container">
    <p>Enter your text or URL</p>
    <input type="text" placeholder="Text or URL" id="qrText">

    <div id="imgBox">
        <img src="" id="qrImage" alt="QR Code">
    </div>

    <button onclick="generateQR()">Generate QR Code</button>
    <a href="https://www.youtube.com/channel/UCkjoHfkLEy7ZT4bA2myJ8xA?sub_confirmation=1" class="watch-link" target="_blank">Watch More Videos</a>
</div>

<script>
    let imgBox = document.getElementById("imgBox");
let qrImage = document.getElementById("qrImage");
let qrText = document.getElementById("qrText");

function generateQR() {
    if(qrText.value.length > 0){
        // Encode le texte pour les caractères spéciaux
        qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(qrText.value);
        imgBox.classList.add("show-img");
    } else {
        qrText.classList.add('error');  // ajoute animation ou bordure rouge si vide
        setTimeout(() => {
            qrText.classList.remove('error');
        }, 1000);
    }
}
</script>

</body>
</html>
